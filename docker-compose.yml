services:
  mysql:
    image: mysql:8.4
    container_name: account-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "Mysql20040101,"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d

  client:
    build: .
    container_name: account-client
    restart: always
    depends_on:
      - mysql

volumes:
  mysql_data: